<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Automatic Pet Feeder</title>
    <meta name="description" content="Reset your password for the Automatic Pet Feeder application.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/images/logo.svg" alt="Pet Feeder Logo">
                    <span>PetFeeder</span>
                </a>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/images/logo.svg" alt="Pet Feeder Logo" class="auth-logo">
                <h1 class="auth-title">Reset Your Password</h1>
                <p class="auth-subtitle">Enter your email to receive a password reset link</p>
            </div>

            <div class="auth-content">
                <form id="reset-password-form" class="auth-form active">
                    <div class="auth-form-group">
                        <label for="email" class="auth-form-label">Email</label>
                        <div class="auth-form-control">
                            <input type="email" id="email" name="email" required autocomplete="email" placeholder="Your email address" class="auth-form-input">
                        </div>
                    </div>
                    <div class="auth-error" id="reset-error"></div>
                    <div class="auth-success" id="reset-success"></div>
                    <button type="submit" class="auth-submit" data-original-text="Send Reset Link">Send Reset Link</button>
                </form>
            </div>

            <div class="auth-footer">
                <p class="auth-footer-text">Remembered your password? <a href="login.html" class="auth-footer-link">Back to Login</a></p>
            </div>
        </div>
    </main>

    <footer class="site-footer auth-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2023 PetFeeder. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                    <a href="#">Support</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/auth.js"></script>
</body>
</html>
